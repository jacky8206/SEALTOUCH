<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>YF SealTouch - 封口機控制介面</title>
  <style>
    :root { --ink:#1e293b; --muted:#64748b; --line:#e2e8f0; --surface:#f8fafc; --panel:#fff; --brand:#f97316; --brand-dark:#ea580c; --brand-soft:#fff7ed; --green:#22c55e; --green-dark:#15803d; --green-soft:#f0fdf4; --amber:#f59e0b; --red:#ef4444; --red-dark:#dc2626; --shadow:0 5px 16px rgba(15,23,42,.10); }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { width:100%; height:100%; margin:0; overflow:hidden; background:#dbe3eb; }
    body { display:grid; place-items:center; color:var(--ink); font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei",Arial,sans-serif; }
    button { border:0; font:inherit; color:inherit; cursor:pointer; } button:active { transform:scale(.97); } button:disabled { opacity:.52; cursor:not-allowed; }
    .shell { position:relative; width:min(100vw,calc(100vh * 1.6667)); height:min(100vh,calc(100vw / 1.6667)); min-width:320px; min-height:192px; overflow:hidden; border:7px solid var(--ink); border-radius:13px; background:var(--surface); box-shadow:0 16px 40px rgba(15,23,42,.26); aspect-ratio:5/3; }
    .topbar { height:12.5%; display:flex; align-items:center; justify-content:space-between; padding:0 3.3%; background:var(--panel); border-bottom:1px solid var(--line); }
    .brand { display:flex; align-items:center; gap:9px; } .brand-mark { display:grid; place-items:center; width:clamp(46px,7.3vw,58px); height:clamp(34px,5.2vw,42px); overflow:hidden; border:1px solid var(--line); border-radius:7px; background:#fff; } .brand-mark img { width:100%; height:100%; object-fit:contain; } .brand-name { font-size:clamp(12px,2vw,17px); font-weight:900; line-height:1; } .brand-model { margin-top:4px; color:var(--muted); font-size:clamp(8px,1.25vw,11px); font-weight:800; letter-spacing:.05em; }
    .system-state { display:flex; align-items:center; gap:6px; padding:5px 8px; border:1px solid #bbf7d0; border-radius:999px; background:var(--green-soft); color:var(--green-dark); font-size:clamp(8px,1.3vw,11px); font-weight:800; } .state-dot { width:8px; height:8px; border-radius:50%; background:var(--green); }
    .main { height:76%; display:grid; grid-template-columns:37% 61%; gap:2%; padding:2.1% 3.3%; }
    .panel { min-width:0; overflow:hidden; border:1px solid var(--line); border-radius:10px; background:var(--panel); box-shadow:var(--shadow); }
    .control-status { display:grid; grid-template-columns:42% 58%; }
    .control-status .status { min-width:0; display:flex; flex-direction:column; border-right:1px solid var(--line); }
    .control-status .controls { min-width:0; padding:7% 8%; }
    .control-status .secondary-controls { padding-top:8px; }
    .status { display:flex; flex-direction:column; } .panel-label { padding:8% 10% 5%; color:var(--muted); font-size:clamp(8px,1.35vw,11px); font-weight:900; letter-spacing:.07em; } .temp-block { padding:0 10%; } .temp-row { display:flex; align-items:baseline; gap:3px; } .temp-number { font-family:ui-monospace,SFMono-Regular,Consolas,monospace; font-size:clamp(30px,6.3vw,53px); font-weight:900; line-height:.9; letter-spacing:-.08em; } .temp-unit { color:var(--muted); font-size:clamp(10px,1.7vw,14px); font-weight:800; } .temp-target { margin-top:7px; color:var(--muted); font-size:clamp(8px,1.35vw,11px); } .temp-target strong { color:var(--ink); }
    .heat-line { height:7px; margin:11px 10% 0; overflow:hidden; border-radius:99px; background:#f1f5f9; } .heat-fill { width:98%; height:100%; border-radius:inherit; background:var(--green); transition:.3s ease; } .heat-state { padding:6px 10%; color:var(--green-dark); font-size:clamp(8px,1.25vw,10px); font-weight:800; } .temp-chart { display:grid; grid-template-rows:auto 1fr; flex:1; min-height:76px; gap:3px; margin:0 10% 7px; padding:6px 7px 5px; border:1px solid #fed7aa; border-radius:7px; background:var(--brand-soft); } .chart-heading { display:flex; align-items:center; justify-content:space-between; color:var(--muted); font-size:clamp(6px,1vw,8px); font-weight:800; } .chart-heading strong { color:var(--brand-dark); } .temp-trend { display:block; width:100%; height:100%; min-height:45px; background:repeating-linear-gradient(0deg, transparent 0 15px, #ffedd5 15px 16px); } .status-list { border-top:1px solid var(--line); } .status-item { display:flex; align-items:center; justify-content:space-between; padding:7px 10%; border-bottom:1px solid #f1f5f9; color:var(--muted); font-size:clamp(8px,1.25vw,10px); } .status-item:last-child { border:0; } .status-value { color:var(--green-dark); font-weight:900; }
    .operation { display:grid; grid-template-rows:auto 1fr auto; padding:4.8% 5.5%; text-align:center; } .mode-switch { display:inline-grid; grid-template-columns:1fr 1fr; width:min(100%,250px); justify-self:center; padding:3px; border-radius:8px; background:#f1f5f9; } .mode-switch button { min-height:30px; border-radius:6px; background:transparent; color:var(--muted); font-size:clamp(8px,1.3vw,11px); font-weight:900; transition:.2s; } .mode-switch button.active { background:var(--brand); color:#fff; box-shadow:0 2px 6px rgba(249,115,22,.25); }
    .machine { position:relative; align-self:center; justify-self:center; width:min(78%,250px); height:86%; min-height:122px; } .machine-top { position:absolute; top:8%; left:12%; width:76%; height:21%; border:5px solid var(--ink); border-bottom-width:9px; border-radius:14px 14px 7px 7px; background:#f1f5f9; transition:transform .22s ease-in; } .machine-top.pressing { transform:translateY(25px); transition-timing-function:ease-out; } .machine-top::after { content:"HEAT PRESS"; position:absolute; inset:24% 0 auto; color:var(--muted); font-family:ui-monospace,monospace; font-size:clamp(7px,1.1vw,9px); font-weight:900; letter-spacing:.12em; } .cup { position:absolute; bottom:12%; left:30%; width:40%; height:45%; overflow:hidden; border:6px solid var(--ink); border-top-width:7px; border-radius:8px 8px 25px 25px; background:var(--brand-soft); } .cup::before { content:""; position:absolute; top:17%; left:0; width:100%; height:18%; background:#b78662; } .cup::after { content:""; position:absolute; left:-13%; bottom:0; width:126%; height:23%; background:#fed7aa; transform:skewY(-12deg); } .rail { position:absolute; right:6%; bottom:5%; left:6%; height:13%; border-radius:8px; background:#475569; } .rail::after { content:""; position:absolute; inset:28% 8%; border-radius:4px; background:#cbd5e1; } .machine-caption { color:var(--muted); font-size:clamp(8px,1.25vw,10px); font-weight:700; } .machine-caption strong { color:var(--brand-dark); }
    .controls { display:grid; grid-template-rows:1fr auto; gap:8px; } .primary-control { display:grid; place-items:center; padding:9%; border-radius:10px; background:var(--brand); color:#fff; box-shadow:0 7px 14px rgba(249,115,22,.25); } .primary-control:hover { background:var(--brand-dark); } .primary-control:disabled { background:#94a3b8; box-shadow:none; } .play { display:grid; place-items:center; width:clamp(38px,7.5vw,62px); height:clamp(38px,7.5vw,62px); border:2px solid rgba(255,255,255,.75); border-radius:50%; } .play::after { content:""; width:0; height:0; margin-left:4px; border-top:10px solid transparent; border-bottom:10px solid transparent; border-left:15px solid #fff; } .primary-label { margin-top:6px; font-size:clamp(13px,2.1vw,18px); font-weight:900; } .primary-hint { margin-top:3px; color:#ffedd5; font-size:clamp(8px,1.2vw,10px); } .secondary-controls { display:grid; grid-template-columns:1fr; gap:8px; } .small-control { min-height:48px; border:1px solid var(--line); border-radius:9px; background:#f8fafc; color:var(--ink); font-size:clamp(9px,1.35vw,11px); font-weight:900; } .small-control:hover { background:#f1f5f9; } .emergency { min-height:96px; border-color:var(--red); background:var(--red); color:#fff; box-shadow:0 3px 8px rgba(239,68,68,.2); } .emergency:hover { background:var(--red-dark); }
    .footer { height:11.5%; display:grid; grid-template-columns:20% 6.5% 17.5% 17.5% 17.5% 1fr; align-items:center; gap:0; padding:0 3.3%; background:#e2e8f0; border-top:1px solid #cbd5e1; } .metric { min-width:0; padding:5px 9px; border-left:3px solid var(--brand); background:transparent; } .metric:nth-child(3) { border-left-color:var(--green); } .metric:nth-child(4) { border-left-color:#3b82f6; } .metric:nth-child(5) { border-left-color:var(--amber); } .metric-key { display:block; color:var(--muted); font-size:clamp(7px,1.1vw,9px); font-weight:800; } .metric-value { display:block; margin-top:2px; color:var(--ink); font-family:ui-monospace,monospace; font-size:clamp(10px,1.55vw,13px); font-weight:900; white-space:nowrap; } .metric:first-child .metric-value { color:var(--brand-dark); } .count-reset { display:grid; place-items:center; justify-self:start; width:clamp(35px,5vw,45px); height:clamp(29px,4.4vw,35px); margin-left:-9px; border-radius:8px; background:var(--brand-soft); color:var(--brand-dark); font-size:clamp(8px,1.2vw,10px); font-weight:900; } .settings { display:grid; place-items:center; justify-self:end; width:clamp(42px,6vw,52px); height:clamp(35px,5vw,43px); border-radius:9px; background:var(--ink); color:#fff; font-size:clamp(15px,2.3vw,19px); box-shadow:0 2px 6px rgba(15,23,42,.15); }
    .settings-overlay, .alarm { position:absolute; z-index:7; inset:0; display:none; place-items:center; padding:6%; background:rgba(15,23,42,.60); backdrop-filter:blur(3px); } .settings-overlay.open, .alarm.show { display:grid; } .settings-sheet, .alarm-box { width:min(86%,430px); max-height:88%; overflow:auto; border-radius:18px; background:#fff; box-shadow:0 20px 45px rgba(15,23,42,.30); animation:scaleIn .2s ease-out; } .sheet-head { display:flex; align-items:center; justify-content:space-between; padding:4% 5%; background:var(--ink); color:#fff; } .sheet-title { font-size:clamp(13px,2vw,17px); font-weight:900; } .close { width:28px; height:28px; border-radius:7px; background:#334155; color:#fff; font-size:18px; } .setting-grid { display:grid; gap:7px; padding:2% 5%; } .setting-row { display:grid; grid-template-columns:1fr auto; align-items:center; gap:8px; padding:7px 0; border-bottom:1px solid #f1f5f9; } .setting-name { font-size:clamp(9px,1.4vw,12px); font-weight:900; } .setting-note { margin-top:2px; color:var(--muted); font-size:clamp(7px,1.05vw,9px); } .stepper { display:grid; grid-template-columns:27px 45px 27px; height:29px; overflow:hidden; border:1px solid var(--line); border-radius:7px; } .stepper button { background:#f1f5f9; color:var(--brand-dark); font-size:17px; font-weight:900; } .stepper output { display:grid; place-items:center; font-family:ui-monospace,monospace; font-size:clamp(9px,1.4vw,12px); font-weight:900; } .film-option { width:90%; margin:2% 5% 5%; padding:9px; border:1px solid #fed7aa; border-radius:8px; background:var(--brand-soft); color:var(--brand-dark); font-size:clamp(8px,1.2vw,10px); font-weight:800; text-align:left; }
    .toast { position:absolute; z-index:10; left:50%; bottom:15%; padding:9px 15px; transform:translate(-50%,14px); border-radius:8px; background:var(--ink); color:#fff; opacity:0; font-size:11px; font-weight:700; pointer-events:none; transition:.22s ease; } .toast.show { transform:translate(-50%,0); opacity:1; } .alarm-box { padding:5%; border:2px solid #fecaca; background:#fef2f2; color:#991b1b; text-align:center; } .alarm-code { color:var(--red); font-family:ui-monospace,monospace; font-size:clamp(25px,5vw,40px); font-weight:900; } .alarm-text { margin:5px 0 12px; font-size:clamp(9px,1.5vw,13px); font-weight:900; } .alarm-box button { padding:8px 15px; border-radius:8px; background:var(--red); color:#fff; font-size:clamp(9px,1.4vw,12px); font-weight:800; } @keyframes scaleIn { from { transform:scale(.95); opacity:0; } to { transform:scale(1); opacity:1; } }
    @media (max-width:500px), (max-height:300px) { .shell { border-width:4px; border-radius:7px; } .brand-mark { width:25px; height:25px; border-radius:6px; font-size:10px; } .main { padding-top:1.5%; padding-bottom:1.5%; } .primary-control { padding:5%; } .small-control { min-height:36px; } }
  </style>
</head>
<body>
  <main class="shell" aria-label="封口機觸控控制介面">
    <header class="topbar"><div class="brand"><div class="brand-mark"><img src="assets/phoenixes-logo-white.png" alt="PHOENIXES Taiwan Technology"></div><div><div class="brand-name">封王封口機</div><div class="brand-model">PH-533+</div></div></div><div class="system-state"><span class="state-dot"></span><span id="topState">系統就緒</span></div></header>
    <section class="main">
      <section class="panel operation" aria-label="封口作業"><div class="mode-switch" role="group" aria-label="作業模式"><button class="active" data-mode="自動">自動</button><button data-mode="半自動">半自動</button></div><div class="machine" aria-hidden="true"><div class="machine-top" id="machinePress"></div><div class="cup"></div><div class="rail"></div></div><div class="machine-caption" id="machineCaption">請置入杯子後，將<strong>自動偵測封口</strong></div></section>
      <section class="panel control-status" aria-label="溫度與作業控制">
        <section class="status" aria-label="溫度與機台狀態"><div class="panel-label">上模即時溫度</div><div class="temp-block"><div class="temp-row"><span class="temp-number" id="actualTemp">160</span><span class="temp-unit">°C</span></div><div class="temp-target">設定溫度 <strong id="targetTemp">160°C</strong></div></div><div class="heat-line"><div class="heat-fill" id="heatFill"></div></div><div class="heat-state" id="heatState">已達工作溫度</div><div class="temp-chart" aria-label="溫度趨勢圖，範圍正負三度"><div class="chart-heading"><strong>溫度趨勢</strong><span>160 ± 3°C</span></div><canvas class="temp-trend" id="tempTrend" aria-label="即時溫度趨勢"></canvas></div><div class="status-list"><div class="status-item"><span>安全門</span><span class="status-value">已關閉</span></div><div class="status-item"><span>封口膜電眼</span><span class="status-value">偵測正常</span></div><div class="status-item"><span>下模位置</span><span class="status-value" id="moldPosition">待機</span></div></div></section>
        <section class="controls" aria-label="作業控制"><button class="primary-control" id="startButton" aria-label="啟動封口"><span class="play"></span><span class="primary-label">啟動封口</span><span class="primary-hint" id="startHint">自動模式已啟用</span></button><div class="secondary-controls"><button class="small-control emergency" id="emergencyButton">緊急停止</button></div></section>
      </section>
    </section>
    <footer class="footer"><div class="metric"><span class="metric-key">今日封口數</span><span class="metric-value"><span id="counter">128</span> 杯</span></div><button class="count-reset" id="counterButton" aria-label="封口計數歸零">歸零</button><div class="metric"><span class="metric-key">封口時間 P3</span><span class="metric-value"><span id="sealTime">1.0</span> 秒</span></div><div class="metric"><span class="metric-key">進杯時間 P4</span><span class="metric-value"><span id="feedTime">1.0</span> 秒</span></div><div class="metric"><span class="metric-key">收料 P5</span><span class="metric-value" id="filmTime">電眼控制</span></div><button class="settings" id="settingsButton" aria-label="開啟參數設定">⚙</button></footer>
    <div class="settings-overlay" id="settingsOverlay"><aside class="settings-sheet" aria-label="作業參數設定"><div class="sheet-head"><span class="sheet-title">作業參數</span><button class="close" id="closeSettings" aria-label="關閉設定">×</button></div><div class="setting-grid"><div class="setting-row"><div><div class="setting-name">P1 封口溫度</div><div class="setting-note">易撕膜 140-160°C</div></div><div class="stepper"><button data-step="temp" data-delta="-5">−</button><output id="tempOutput">160</output><button data-step="temp" data-delta="5">+</button></div></div><div class="setting-row"><div><div class="setting-name">P3 封口時間</div><div class="setting-note">範圍 0.1-3.0 秒</div></div><div class="stepper"><button data-step="seal" data-delta="-1">−</button><output id="sealOutput">010</output><button data-step="seal" data-delta="1">+</button></div></div><div class="setting-row"><div><div class="setting-name">P4 進杯時間</div><div class="setting-note">範圍 0.0-3.0 秒</div></div><div class="stepper"><button data-step="feed" data-delta="-1">−</button><output id="feedOutput">010</output><button data-step="feed" data-delta="1">+</button></div></div><div class="setting-row"><div><div class="setting-name">P5 收料時間</div><div class="setting-note">電眼膜建議設定 000</div></div><div class="stepper"><button data-step="film" data-delta="-1">−</button><output id="filmOutput">000</output><button data-step="film" data-delta="1">+</button></div></div></div><button class="film-option" id="filmOption">封口膜：電眼定位膜（P5 = 000）</button></aside></div>
    <div class="toast" id="toast" role="status"></div><div class="alarm" id="alarm" role="alertdialog" aria-modal="true"><div class="alarm-box"><div class="alarm-code">E07</div><div class="alarm-text">安全門保護已啟動</div><button id="resumeButton">解除並恢復</button></div></div>
  </main>
  <script>
    const state={mode:'自動',counter:128,targetTemp:160,actualTemp:160,seal:10,feed:10,film:0,running:false,eyeFilm:true}; const $=(id)=>document.getElementById(id); const ready=()=>state.actualTemp>=state.targetTemp-2; const showToast=(message)=>{const el=$('toast');el.textContent=message;el.classList.add('show');clearTimeout(window.toastTimer);window.toastTimer=setTimeout(()=>el.classList.remove('show'),1600)}; const openSettings=()=>$('settingsOverlay').classList.add('open'); const closeSettings=()=>$('settingsOverlay').classList.remove('open'); const trendSamples=[159.2,160.4,161.1,159.8,162.2,160.8,158.7,160.2,161.7,159.5,160.6,162.5];
    function drawTemperatureTrend(){const canvas=$('tempTrend');if(!canvas)return;const rect=canvas.getBoundingClientRect();const width=Math.max(1,rect.width),height=Math.max(1,rect.height),ratio=window.devicePixelRatio||1;canvas.width=Math.round(width*ratio);canvas.height=Math.round(height*ratio);const ctx=canvas.getContext('2d');ctx.scale(ratio,ratio);const next=Math.max(157,Math.min(163,160+Math.sin(Date.now()/700)*2.2+Math.sin(Date.now()/230)*.45));trendSamples.shift();trendSamples.push(next);const y=(value)=>height-5-((value-157)/6)*(height-10);ctx.setLineDash([3,3]);ctx.strokeStyle='rgba(234,88,12,.28)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,y(160));ctx.lineTo(width,y(160));ctx.stroke();ctx.setLineDash([]);ctx.beginPath();trendSamples.forEach((value,index)=>{const x=index*(width/(trendSamples.length-1));index?ctx.lineTo(x,y(value)):ctx.moveTo(x,y(value))});ctx.lineTo(width,height);ctx.lineTo(0,height);ctx.closePath();ctx.fillStyle='rgba(249,115,22,.14)';ctx.fill();ctx.beginPath();trendSamples.forEach((value,index)=>{const x=index*(width/(trendSamples.length-1));index?ctx.lineTo(x,y(value)):ctx.moveTo(x,y(value))});ctx.strokeStyle='#f97316';ctx.lineWidth=2;ctx.lineJoin='round';ctx.lineCap='round';ctx.stroke();const last=trendSamples.length-1;ctx.beginPath();ctx.arc(width,y(trendSamples[last]),2.8,0,Math.PI*2);ctx.fillStyle='#ea580c';ctx.fill()}
    function refresh(){ $('counter').textContent=state.counter;$('actualTemp').textContent=state.actualTemp;$('targetTemp').textContent=state.targetTemp+'°C';$('tempOutput').textContent=state.targetTemp;$('sealOutput').textContent=String(state.seal).padStart(3,'0');$('feedOutput').textContent=String(state.feed).padStart(3,'0');$('filmOutput').textContent=String(state.film).padStart(3,'0');$('sealTime').textContent=(state.seal/10).toFixed(1);$('feedTime').textContent=(state.feed/10).toFixed(1);$('filmTime').textContent=state.eyeFilm?'電眼控制':(state.film/10).toFixed(1)+' 秒';$('heatFill').style.width=Math.min(100,Math.round(state.actualTemp/state.targetTemp*100))+'%';$('heatFill').style.background=ready()?'var(--green)':'var(--amber)';$('heatState').textContent=ready()?'已達工作溫度':'加熱中，僅可半自動操作';$('heatState').style.color=ready()?'var(--green-dark)':'#b45309';$('topState').textContent=state.running?'封口作業中':ready()?'系統就緒':'加熱中';$('startButton').disabled=state.mode==='自動'&&!ready();$('startHint').textContent=state.mode==='自動'?(ready()?'偵測到杯子即自動封口':'等待溫度到達設定值'):'請置杯後按下啟動'; }
    document.querySelectorAll('[data-mode]').forEach((button)=>button.addEventListener('click',()=>{state.mode=button.dataset.mode;document.querySelectorAll('[data-mode]').forEach((item)=>item.classList.toggle('active',item===button));$('machineCaption').innerHTML=state.mode==='自動'?'請置入杯子後，將<strong>自動偵測封口</strong>':'置入杯子後，請按<strong>啟動封口</strong>';refresh();showToast('已切換為'+state.mode+'模式')}));
    $('startButton').addEventListener('click',()=>{if(state.running||!ready())return;const duration=Math.max(650,(state.seal+state.feed)*55);state.running=true;$('moldPosition').textContent='封口中';$('machineCaption').innerHTML='<strong>封口作業進行中</strong>';$('machinePress').classList.add('pressing');refresh();setTimeout(()=>$('machinePress').classList.remove('pressing'),Math.max(250,duration*.55));setTimeout(()=>{state.counter+=1;state.running=false;$('moldPosition').textContent='待機';$('machineCaption').innerHTML='封口完成，請取出杯子';refresh();showToast('封口完成')},duration)});
    $('counterButton').addEventListener('click',()=>{state.counter=0;refresh();showToast('封口計數已歸零')});$('settingsButton').addEventListener('click',openSettings);$('closeSettings').addEventListener('click',closeSettings);$('settingsOverlay').addEventListener('click',(event)=>{if(event.target===$('settingsOverlay'))closeSettings()});$('filmOption').addEventListener('click',()=>{state.eyeFilm=!state.eyeFilm;state.film=state.eyeFilm?0:10;$('filmOption').textContent=state.eyeFilm?'封口膜：電眼定位膜（P5 = 000）':'封口膜：無電眼膜（可調整 P5）';refresh()});document.querySelectorAll('[data-step]').forEach((button)=>button.addEventListener('click',()=>{const delta=Number(button.dataset.delta),field=button.dataset.step;if(field==='temp'){state.targetTemp=Math.max(120,Math.min(190,state.targetTemp+delta));state.actualTemp=Math.min(state.actualTemp,state.targetTemp)}if(field==='seal')state.seal=Math.max(1,Math.min(30,state.seal+delta));if(field==='feed')state.feed=Math.max(0,Math.min(30,state.feed+delta));if(field==='film'&&!state.eyeFilm)state.film=Math.max(0,Math.min(60,state.film+delta));refresh()}));$('emergencyButton').addEventListener('click',()=>{state.running=false;$('alarm').classList.add('show');$('moldPosition').textContent='安全停止';refresh()});$('resumeButton').addEventListener('click',()=>{$('alarm').classList.remove('show');$('moldPosition').textContent='待機';refresh();showToast('安全門已確認，系統恢復待機')});refresh();drawTemperatureTrend();setInterval(drawTemperatureTrend,650);window.addEventListener('resize',drawTemperatureTrend);
  </script>
</body>
</html>
